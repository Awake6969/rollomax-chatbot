version: "3.8"

services:
  n8n:
    image: n8nio/n8n:latest
    restart: always
    expose:
      - "5678"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - N8N_HOST=${N8N_HOST}
      - N8N_PROTOCOL=${N8N_PROTOCOL}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - WEBHOOK_URL=${WEBHOOK_URL}
      - N8N_PORT=5678
      - NODE_ENV=production
      - GENERIC_TIMEZONE=Europe/Vienna
    networks:
      - chatbot-net

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./widget:/srv/widget
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - n8n
    networks:
      - chatbot-net

volumes:
  n8n_data:
  caddy_data:
  caddy_config:

networks:
  chatbot-net:
