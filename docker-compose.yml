services:
  n8n:
    image: n8nio/n8n:1.70.3
    restart: always
    expose:
      - "5678"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - N8N_HOST=${N8N_HOST}
      - N8N_PROTOCOL=${N8N_PROTOCOL}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - WEBHOOK_URL=${WEBHOOK_URL}
      - N8N_PORT=5678
      - NODE_ENV=production
      - GENERIC_TIMEZONE=Europe/Vienna
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - WIDGET_AUTH_TOKEN=${WIDGET_AUTH_TOKEN}
      - RATE_LIMIT_PER_IP=${RATE_LIMIT_PER_IP}
      - RATE_LIMIT_WINDOW_MINUTES=${RATE_LIMIT_WINDOW_MINUTES}
      - N8N_RUNNERS_MODE=internal
      - N8N_RUNNERS_TASK_TIMEOUT=300
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=false
    labels:
      - traefik.enable=true
      - traefik.http.routers.rollomax-webhook.rule=Host(`chat.rollomax.at`) && PathPrefix(`/webhook/`)
      - traefik.http.routers.rollomax-webhook.tls=true
      - traefik.http.routers.rollomax-webhook.entrypoints=web,websecure
      - traefik.http.routers.rollomax-webhook.tls.certresolver=mytlschallenge
      - traefik.http.services.rollomax-webhook.loadbalancer.server.port=5678
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - chatbot-net
      - n8n_default

volumes:
  n8n_data:

networks:
  chatbot-net:
  n8n_default:
    external: true
